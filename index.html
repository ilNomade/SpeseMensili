    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-font-smoothing: antialiased; }

        /* Effetti Bagliore dinamici basati su immagine.jpg */
        .spesa-massima {
            box-shadow: 0 10px 16px -4px rgba(239, 68, 68, 0.18), 
                        inset 0 -6px 10px -4px rgba(239, 68, 68, 0.12);
            border-bottom: 1.5px solid rgba(239, 68, 68, 0.45) !important;
        }

        .spesa-minima {
            box-shadow: 0 10px 16px -4px rgba(34, 197, 94, 0.18), 
                        inset 0 -6px 10px -4px rgba(34, 197, 94, 0.12);
            border-bottom: 1.5px solid rgba(34, 197, 94, 0.45) !important;
        }

</head>
<body class="bg-gray-50 flex justify-center h-screen overflow-hidden">

    <div class="w-full max-w-md bg-white h-full flex flex-col relative shadow-2xl">
        
        <header class="flex items-center justify-between px-5 pt-12 pb-4 bg-white z-10">
            <button class="text-gray-800 text-xl">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h1 class="text-[17px] font-semibold text-gray-900">Le Mie Spese</h1>
            <button class="text-gray-800 text-xl">
                <i class="fa-regular fa-clock"></i>
            </button>
        </header>

        <div class="px-5 pt-2 pb-4 bg-white z-10 border-b border-gray-100">
            <h2 class="text-3xl font-bold text-[#0B1527] mb-1">Panoramica Spese</h2>
            <p id="total-container" class="text-gray-500 text-sm font-medium">totale in €: Calcolo in corso...</p>
        </div>

        <main class="flex-1 overflow-y-auto px-5 pt-4 pb-12 bg-[#FAFAFA]" id="expenses-list">
            
            <div id="loading" class="flex flex-col items-center justify-center h-40 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                <p class="text-sm">Sincronizzazione dati da Google...</p>
            </div>

        </main>

    </div>

    <script>
        // ID del tuo foglio Google Sheets
        const SHEET_ID = '1kwitqUrJCydNRI9ul5L6ytg4drUBOqHUTv-VKz0PBDk'; 
        
        // Mappatura icone e colori delle categorie
        const categoryConfig = {
            'intrattenimento': { icon: 'fa-gamepad', text: 'text-purple-600', bg: 'bg-purple-100' },
            'trasporti':       { icon: 'fa-bus', text: 'text-blue-500', bg: 'bg-blue-100' },
            'cibo':            { icon: 'fa-utensils', text: 'text-green-500', bg: 'bg-green-100' },
            'benzina':         { icon: 'fa-gas-pump', text: 'text-orange-500', bg: 'bg-orange-100' },
            'auto':            { icon: 'fa-car-side', text: 'text-blue-500', bg: 'bg-blue-100' },
            'parcheggio':      { icon: 'fa-parking', text: 'text-teal-600', bg: 'bg-teal-100' },
            'autostrada':      { icon: 'fa-road', text: 'text-yellow-500', bg: 'bg-yellow-100' },
            'hobby':           { icon: 'fa-gamepad', text: 'text-pink-500', bg: 'bg-pink-100' },
            'regali':          { icon: 'fa-gift', text: 'text-purple-500', bg: 'bg-purple-100' },
            'viaggi':          { icon: 'fa-plane', text: 'text-cyan-500', bg: 'bg-cyan-100' },
            'shopping':        { icon: 'fa-bag-shopping', text: 'text-pink-500', bg: 'bg-pink-100' },
            'abbonamenti':     { icon: 'fa-credit-card', text: 'text-orange-500', bg: 'bg-orange-100' },
            'altro':           { icon: 'fa-ellipsis', text: 'text-gray-500', bg: 'bg-gray-200' }
        };

        // Recupero asincrono dei dati reali dal foglio Google
        async function fetchExpenses() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Errore di rete");
                const text = await response.text();
                
                const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/)[1];
                const data = JSON.parse(jsonString);
                
                renderList(data.table.rows);
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation text-red-500 text-2xl mb-2"></i>
                    <p class="text-sm text-red-500 font-semibold">Impossibile caricare i dati</p>`;
                document.getElementById('total-container').innerText = "totale in €: errore";
            }
        }

        // Renderizzazione dinamica ed elaborazione dei bagliori
        function renderList(rows) {
            const container = document.getElementById('expenses-list');
            container.innerHTML = ''; 

            let dati = rows;
            let totaleSomma = 0;
            
            // Salta l'eventuale riga di intestazione del foglio
            if (rows[0] && rows[0].c[0] && rows[0].c[0].v && 
                (rows[0].c[0].v.toLowerCase() === 'categoria' || rows[0].c[0].v.toLowerCase() === 'nome' || rows[0].c[0].v.toLowerCase() === 'spese')) {
                dati = rows.slice(1);
            }

            // Primo passaggio: estrazione degli importi validi (> 0) per calcolare il Max e il Min reali
            let importiValidi = [];
            let speseElaborate = [];

            dati.forEach(row => {
                if (!row || !row.c || !row.c[0] || row.c[0].v === null) return;

                const nomeCategoria = row.c[0].v.toString().trim();
                let valoreNumerico = 0;
                let importoFormattato = '0';

                if (row.c[1]) {
                    valoreNumerico = Number(row.c[1].v) || 0;
                    importoFormattato = row.c[1].f || row.c[1].v || '0';
                }

                totaleSomma += valoreNumerico;

                if (valoreNumerico > 0) {
                    importiValidi.push(valoreNumerico);
                }

                speseElaborate.push({
                    nome: nomeCategoria,
                    valore: valoreNumerico,
                    testoFormattato: String(importoFormattato).replace('.', ',')
                });
            });

            // Calcolo dei valori massimi e minimi assoluti e verifica dei pareggi
            let maxVal = null;
            let minVal = null;
            let conteggioMax = 0;
            let conteggioMin = 0;

            if (importiValidi.length >= 2) {
                maxVal = Math.max(...importiValidi);
                minVal = Math.min(...importiValidi);
                conteggioMax = importiValidi.filter(v => v === maxVal).length;
                conteggioMin = importiValidi.filter(v => v === minVal).length;
            }

            // Secondo passaggio: creazione degli elementi visivi con i relativi bagliori applicati
            speseElaborate.forEach(spesa => {
                let classeBagliore = '';

                if (spesa.valore > 0) {
                    if (spesa.valore === maxVal && conteggioMax === 1) {
                        classeBagliore = 'spesa-massima';
                    } else if (spesa.valore === minVal && conteggioMin === 1) {
                        classeBagliore = 'spesa-minima';
                    }
                }

                const stile = categoryConfig[spesa.nome.toLowerCase()] || categoryConfig['altro'];

                const itemDiv = document.createElement('div');
                itemDiv.className = `flex items-center justify-between p-3.5 bg-white border border-gray-100 rounded-2xl mb-3 transition-all duration-3s ${classeBagliore}`;
                
                itemDiv.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${stile.bg} ${stile.text}">
                            <i class="fa-solid ${stile.icon} text-lg"></i>
                        </div>
                        <span class="text-gray-800 font-medium text-[16px]">${spesa.nome}</span>
                    </div>
                    <span class="text-[#0B1527] font-semibold text-[17px]">${spesa.testoFormattato}</span>
                `;
                
                container.appendChild(itemDiv);
            });

            // Aggiorna la stringa del totale generale dell'app
            const totaleFormattatoString = totaleSomma.toFixed(2).replace('.', ',');
            document.getElementById('total-container').innerText = `totale in €: ${totaleFormattatoString}`;

            if (container.children.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 text-sm mt-10">Nessun dato trovato nel foglio.</p>`;
                document.getElementById('total-container').innerText = "totale in €: 0,00";
            }
        }

        // Esecuzione automatica all'apertura dell'app
        fetchExpenses();
    </script>
</body>
</html>
